<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERP Phase 1</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
    header { background: #111827; color: #fff; padding: 16px 24px; }
    nav a { color: #cbd5e1; margin-right: 16px; text-decoration: none; }
    main { padding: 24px; }
    .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08); }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 10px; text-align: left; vertical-align: top; }
    th { background: #f3f4f6; }
    .button, button { background: #0f766e; color: #fff; border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; }
    .secondary { background: #374151; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .muted { color: #6b7280; }
    .messages { list-style: none; padding: 0; }
    .messages li { padding: 12px; margin-bottom: 12px; border-radius: 8px; background: #ecfeff; }
    form p { margin-bottom: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>ERP Phase 1 MVP</h1>
    <nav>
      <a href="/admin/">Admin</a>
      <a href="/reports/templates/">Templates</a>
      <a href="/reports/history/">Reports History</a>
      <a href="/reports/ledger/">Party Ledger</a>
      <a href="/reports/outstanding/">Outstanding</a>
      <a href="/reports/production/">Production</a>
      <a href="/imports/">Imports</a>
      <a href="/imports/history/">Import History</a>
      <a href="/governance/approvals/">Approvals</a>
      <a href="/governance/audit/">Audit</a>
      <a href="/governance/backups/">Backups</a>
    </nav>
  </header>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
