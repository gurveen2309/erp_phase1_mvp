services:
  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    env_file:
      - .env.production
    depends_on:
      - postgres
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - backup_data:/app/backups

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_phase1}
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - media_data:/srv/media
      - static_data:/srv/static
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  media_data:
  static_data:
  backup_data:
  caddy_data:
  caddy_config:
